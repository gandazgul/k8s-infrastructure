---
# rafag-only additional incremental backups.
# The shared infrastructure/kube-system/BackupCronJobs.yaml only backs up the
# per-cluster BACKUP_SOURCE -> BACKUP_DEST pair (rafag: /media/main/rafag ->
# /media/backup/rafag). These extra jobs cover data that lives outside that
# pair and should only exist on the rafag cluster:
#   - /media/yasr        -> /media/backup/yasr    (separate disk, yasr-volume PVC)
#   - /media/main/angela -> /media/backup/angela  (under main-volume)
# NOTE: retention/pruning (rdiff-backup "remove increments") is intentionally
# not wired here yet; increments will grow until that is added. There is ample
# free space (~2.3 TB) for the initial ~343 GB plus a month of increments.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: yasr-backup
  namespace: kube-system
spec:
  interval: 1h0m0s
  path: ./infrastructure/cronjob/
  sourceRef:
    kind: GitRepository
    name: k8s-infrastructure
    namespace: kube-system
  prune: true
  targetNamespace: default
  dependsOn:
    - name: backup-volume
    - name: yasr-volume
  postBuild:
    substitute:
      CRONJOB_NAME: yasr-backup
      SCHEDULE: "0 1,13 * * *"
      IMAGE: docker.io/gandazgul/rdiff-backup:vfa41640
      NAMESPACE: default
  patches:
    - patch: |
        - op: add
          path: /spec/jobTemplate/spec/template/spec/volumes/-
          value:
            name: yasr-volume
            persistentVolumeClaim:
              claimName: yasr-volume
        - op: add
          path: /spec/jobTemplate/spec/template/spec/volumes/-
          value:
            name: backup-volume
            persistentVolumeClaim:
              claimName: backup-volume
      target:
        kind: CronJob
    - patch: |
        - op: add
          path: /spec/jobTemplate/spec/template/spec/containers/0/volumeMounts/-
          value:
            name: yasr-volume
            mountPath: /media/yasr
        - op: add
          path: /spec/jobTemplate/spec/template/spec/containers/0/volumeMounts/-
          value:
            name: backup-volume
            mountPath: /media/backup
      target:
        kind: CronJob
    - patch: |
        - op: add
          path: /spec/jobTemplate/spec/template/spec/containers/0/args
          value: ["--force", "backup", "/media/yasr", "/media/backup/yasr"]
      target:
        kind: CronJob
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: angela-backup
  namespace: kube-system
spec:
  interval: 1h0m0s
  path: ./infrastructure/cronjob/
  sourceRef:
    kind: GitRepository
    name: k8s-infrastructure
    namespace: kube-system
  prune: true
  targetNamespace: default
  dependsOn:
    - name: main-volume
    - name: backup-volume
  postBuild:
    substitute:
      CRONJOB_NAME: angela-backup
      SCHEDULE: "0 2,14 * * *"
      IMAGE: docker.io/gandazgul/rdiff-backup:vfa41640
      NAMESPACE: default
  patches:
    - patch: |
        - op: add
          path: /spec/jobTemplate/spec/template/spec/volumes/-
          value:
            name: main-volume
            persistentVolumeClaim:
              claimName: main-volume
        - op: add
          path: /spec/jobTemplate/spec/template/spec/volumes/-
          value:
            name: backup-volume
            persistentVolumeClaim:
              claimName: backup-volume
      target:
        kind: CronJob
    - patch: |
        - op: add
          path: /spec/jobTemplate/spec/template/spec/containers/0/volumeMounts/-
          value:
            name: main-volume
            mountPath: /media/main
        - op: add
          path: /spec/jobTemplate/spec/template/spec/containers/0/volumeMounts/-
          value:
            name: backup-volume
            mountPath: /media/backup
      target:
        kind: CronJob
    - patch: |
        - op: add
          path: /spec/jobTemplate/spec/template/spec/containers/0/args
          value: ["--force", "backup", "/media/main/angela", "/media/backup/angela"]
      target:
        kind: CronJob
