# rafag-only resource right-sizing: resilio and home-assistant have no requests/limits
# in the shared charts, so they run best-effort/unbounded and are the top memory consumers
# on this single node. Limits sit above current working set to bound runaway growth without
# OOM-killing legitimate usage; kept as a cluster-local patch so gandazgul is unaffected.
patches:
  - target:
      kind: HelmRelease
      name: resilio
    patch: |
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: resilio
      spec:
        values:
          resources:
            requests:
              cpu: 250m
              memory: 2Gi
            limits:
              memory: 13Gi
  - target:
      kind: HelmRelease
      name: home-assistant
    patch: |
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: home-assistant
      spec:
        values:
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              memory: 12Gi
