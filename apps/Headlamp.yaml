---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: headlamp
  namespace: kube-system
spec:
  interval: 1h0m0s
  url: https://kubernetes-sigs.github.io/headlamp/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: default
spec:
  interval: 1h
  chart:
    spec:
      chart: headlamp
      version: 0.40.0
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: kube-system
  values:
    volumes:
      - name: config
        persistentVolumeClaim:
          claimName: yasr-volume
    volumeMounts:
      - name: config
        mountPath: /headlamp/plugins
        subPath: configs/headlamp/plugins/
      - name: config
        mountPath: /home/headlamp/.config/Headlamp/kubeconfigs/
        subPath: configs/headlamp/kube/
    service:
      port: 4466
    securityContext:
      runAsUser: 1000
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        forecastle.stakater.com/appName: "Headlamp"
        forecastle.stakater.com/group: "Management"
        forecastle.stakater.com/expose: "true"
        forecastle.stakater.com/icon: "https://headlamp.dev/img/logo.svg"
      hosts:
        - host: dashboard.${CLUSTER_DOMAIN_NAME}
          paths:
            - path: /
              type: ImplementationSpecific
      tls:
        - secretName: internal-ingress-cert
          hosts:
            - dashboard.${CLUSTER_DOMAIN_NAME}
