---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: audiobookshelf
  namespace: default
spec:
  interval: 1h
  path: ./apps/generic/overlays/audiobookshelf/
  prune: true
  sourceRef:
    kind: GitRepository
    name: k8s-infrastructure
    namespace: kube-system
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: audiobookshelf
      namespace: default
  postBuild:
    substitute:
      AUDIOBOOKSHELF_SUBDOMAIN: "${AUDIOBOOKSHELF_SUBDOMAIN}"
      AUDIOBOOKSHELF_BOOKS_PATH: "${AUDIOBOOKSHELF_BOOKS_PATH}"
      AUDIOBOOKSHELF_MOUNT_PATH: "${AUDIOBOOKSHELF_MOUNT_PATH:=/data}"
    substituteFrom:
      - kind: Secret
        name: secrets
