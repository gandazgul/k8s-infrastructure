---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: berenstain-bears
spec:
  template:
    spec:
      imagePullSecrets:
        - name: ghcr-creds
      containers:
        - name: container
          image: ghcr.io/gandazgul/berenstain-bears:dev
          imagePullPolicy: Always
          env:
            - name: TZ
              value: ${CLUSTER_TIME_ZONE}
            - name: BASIC_AUTH_USER
              value: ${BEARS_USER}
            - name: BASIC_AUTH_PASS
              value: ${BEARS_PASSWORD}
          livenessProbe:
            httpGet:
              scheme: HTTP
              path: /
              port: http
            initialDelaySeconds: 30
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 50Mi
            limits:
              cpu: 200m
              memory: 200Mi
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
