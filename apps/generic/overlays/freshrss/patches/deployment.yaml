apiVersion: apps/v1
kind: Deployment
metadata:
  name: freshrss
spec:
  template:
    spec:
      initContainers:
        - name: install-cntools-extensions
          image: alpine/git:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: CNTOOLS_FRESHRSS_EXTENSIONS_REF
              value: ae40a34e260e0609e49d1a338e42284383e9703b
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              repo_dir="$(mktemp -d)"

              git init "$repo_dir"
              git -C "$repo_dir" remote add origin https://github.com/cn-tools/cntools_FreshRssExtensions.git
              git -C "$repo_dir" fetch --depth 1 origin "$CNTOOLS_FRESHRSS_EXTENSIONS_REF"
              git -C "$repo_dir" checkout --detach FETCH_HEAD

              for extension_path in "$repo_dir"/xExtension-*; do
                  if [ -d "$extension_path" ]; then
                      extension_name="$(basename "$extension_path")"
                      rm -rf "/extensions/$extension_name"
                      cp -R "$extension_path" "/extensions/$extension_name"
                  fi
              done

              chmod -R a+rX /extensions
          volumeMounts:
            - name: yasr-volume
              mountPath: /extensions
              subPath: configs/freshrss/extensions/
      containers:
        - name: container
          image: freshrss/freshrss:latest
          imagePullPolicy: Always
          env:
            - name: TZ
              value: "${CLUSTER_TIME_ZONE}"
            - name: CRON_MIN
              value: "2,32"
          volumeMounts:
            - name: yasr-volume
              mountPath: /var/www/FreshRSS/data
              subPath: configs/freshrss/data/
            - name: yasr-volume
              mountPath: /var/www/FreshRSS/extensions
              subPath: configs/freshrss/extensions/
          livenessProbe:
            httpGet:
              scheme: HTTP
              path: /i/
              port: http
            initialDelaySeconds: 30
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
