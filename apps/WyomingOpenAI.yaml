---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wyoming-openai
  namespace: default
  labels:
    app: wyoming-openai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wyoming-openai
  template:
    metadata:
      labels:
        app: wyoming-openai
    spec:
      containers:
        - name: wyoming-openai
          image: ghcr.io/roryeckel/wyoming_openai:latest
          env:
            - name: WYOMING_URI
              value: "tcp://0.0.0.0:10300"
            - name: WYOMING_LOG_LEVEL
              value: "INFO"
            - name: WYOMING_LANGUAGES
              value: "en"
            - name: TTS_OPENAI_URL
              value: "http://kokoro-tts:8880/v1"
            - name: TTS_OPENAI_KEY
              value: "not-needed"
            - name: TTS_MODELS
              value: "kokoro"
            - name: TTS_BACKEND
              value: "OPENAI"
            - name: TTS_SPEED
              value: "1.0"
          ports:
            - containerPort: 10300
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: wyoming-openai
  namespace: default
  labels:
    app: wyoming-openai
spec:
  type: ClusterIP
  selector:
    app: wyoming-openai
  ports:
    - port: 10300
      targetPort: 10300
      protocol: TCP
