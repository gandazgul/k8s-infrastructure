---
apiVersion: v1
kind: Service
metadata:
  name: kokoro-tts
  namespace: default
spec:
  selector:
    app: kokoro-tts
  ports:
    - protocol: TCP
      port: 8880
      targetPort: 8880
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: kokoro-tts-nodeport
  namespace: default
spec:
  selector:
    app: kokoro-tts
  ports:
    - protocol: TCP
      port: 8880
      targetPort: 8880
      nodePort: 8880
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kokoro-tts
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kokoro-tts
  template:
    metadata:
      labels:
        app: kokoro-tts
    spec:
      containers:
      - name: kokoro-tts
        image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8880
          protocol: TCP
        resources:
          requests:
            memory: "1Gi"
            cpu: "200m"
          limits:
            memory: "2Gi"
            cpu: "2"
        livenessProbe:
          httpGet:
            path: /health
            port: 8880
          initialDelaySeconds: 120
          timeoutSeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8880
          initialDelaySeconds: 60
          timeoutSeconds: 10
          periodSeconds: 15
