---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: hostpath-provisioner
  namespace: kube-system
spec:
  interval: 1h0m0s
  path: ./infrastructure/storage/hostpath-provisioner/
  prune: true
  sourceRef:
    kind: GitRepository
    name: k8s-infrastructure
    namespace: kube-system
  healthChecks:
    - apiVersion: apps/v1
      kind: DaemonSet
      name: hostpath-provisioner
      namespace: kube-system
